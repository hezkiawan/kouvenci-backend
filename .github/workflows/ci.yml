name: Backend CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:           # <--- NEW: Runs tests when you open a PR
    branches: [ "main" ]

env:
  IMAGE_NAME: kouvenci-backend

jobs:
  # ==================================================
  # JOB 1: RUN UNIT TESTS (The Gatekeeper)
  # ==================================================
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.23' # Matches your local version

    - name: Run Unit Tests
      run: go test -v ./...

  # ==================================================
  # JOB 2: BUILD & DEPLOY (Only runs if Test passes)
  # ==================================================
  build-and-push:
    needs: test           # <--- CRITICAL: Stops if tests fail
    runs-on: ubuntu-latest
    # Only build docker images on main, not on PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker image
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_ID=ghcr.io/$OWNER/$IMAGE_NAME

          # Build with commit SHA and latest
          docker build . --file Dockerfile \
            --tag $IMAGE_ID:sha-${{ github.sha }} \
            --tag $IMAGE_ID:latest

          docker push $IMAGE_ID:sha-${{ github.sha }}
          docker push $IMAGE_ID:latest
          
      - name: Update Kubernetes Manifest
        env:
            PERSONAL_ACCESS_TOKEN: ${{ secrets.INFRA_REPO_PAT }}
            NEW_TAG: sha-${{ github.sha }}
        run: |
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git config --global user.name "GitHub Actions"

            git clone https://x-access-token:${PERSONAL_ACCESS_TOKEN}@github.com/hezkiawan/kouvenci-infra.git
            cd kouvenci-infra

            sed -i "s|image: ghcr.io/hezkiawan/kouvenci-backend:.*|image: ghcr.io/hezkiawan/kouvenci-backend:$NEW_TAG|g" k8s-manifests.yaml

            git add k8s-manifests.yaml
            git commit -m "ci: update backend image to $NEW_TAG"
            git push